<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L'Oréal AI Beauty Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <img id="logo" src="img/loreal-logo.png" alt="L'Oréal Logo" />
    <h1>L'Oréal AI Beauty Assistant</h1>
    <p>Build your personalized beauty routine with AI</p>
  </div>

  <hr />

  <!-- PRODUCTS -->
  <h2>Products</h2>
  <div id="product-grid"></div>

  <!-- SELECTED -->
  <h2>Selected Products</h2>
  <div id="selected-products"></div>

  <button class="main-btn" onclick="generateRoutine()">✨ Generate Routine</button>

  <hr />

  <!-- CHAT -->
  <h2>AI Chat</h2>
  <div id="chat"></div>

  <div class="chat-input">
    <input id="user-input" type="text" placeholder="Ask about skincare..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
